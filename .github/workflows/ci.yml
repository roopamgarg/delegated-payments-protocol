name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets
        run: |
          if grep -rE '(AKIA[0-9A-Z]{16}|sk_(live|test)_[0-9a-zA-Z]{24,}|-----BEGIN (RSA |EC )?PRIVATE KEY-----)' . \
            --exclude-dir=.git --exclude-dir=.github 2>/dev/null; then
            echo "::error::Potential secret detected in repository"
            exit 1
          fi
          echo "No obvious secrets found"

      - name: Verify repository structure
        run: |
          test -f README.md
          test -f LICENSE
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -f docs/protocol/research.md
          test -f docs/protocol/agent-identity.md
          test -f docs/protocol/payment-intents.md
          test -f docs/integration-guides/upi.md
          test -f specs/schemas/capability-token.schema.json
          test -f specs/schemas/payment-intent.schema.json
          test -f specs/schemas/mandate.schema.json
          test -f sdk/merchant-sdk/package.json
          echo "Required files present"

      - name: Validate JSON schemas
        run: bash scripts/validate-schemas.sh

      - name: Typecheck merchant SDK
        run: |
          cd sdk/merchant-sdk
          npm install
          npm run typecheck

      - name: Run Stripe reference snippet
        run: |
          cd sdk/merchant-sdk
          npm run build
          cd ../examples/stripe-delegated-payment
          node checkout-flow.mjs
